spring.application.name=agriconnect_backend

#configure of the server port number with the different number
server.port = 2026
#configure the db properties
spring.datasource.url=jdbc:mysql://localhost:3306/agriconnect
spring.datasource.username=root
spring.datasource.password=#Sudheer@2007

#configure the hiberante and the jpa properties
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql = true
spring.jpa.hibernate.ddl-auto = update


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true